# /home/qianqz/Qwen-SFT/configs/train_full.yaml
# ==============================================================================
# SFT Training Configuration for Qwen2.5-0.5B
# Full Finetuning on A100-64G (Single GPU)
# Hyperparameters validated for 0.5B model with 300k dataset
# ==============================================================================

# ------------------------------------------------------------------------------
# Model Configuration
# ------------------------------------------------------------------------------
model_name_or_path: /home/qianqz/Model/Qwen2.5-0.5B
trust_remote_code: true
cache_dir: /home/qianqz/.cache/huggingface

# ------------------------------------------------------------------------------
# Method Configuration
# ------------------------------------------------------------------------------
stage: sft
do_train: true
finetuning_type: full
plot_loss: true

# ------------------------------------------------------------------------------
# Dataset Configuration
# ------------------------------------------------------------------------------
dataset: openorca_sft_300k
dataset_dir: /home/qianqz/LlamaFactory/data
template: qwen
cutoff_len: 1024
preprocessing_num_workers: 8
overwrite_cache: true

# ------------------------------------------------------------------------------
# Output Configuration
# ------------------------------------------------------------------------------
output_dir: /home/qianqz/Qwen-SFT/outputs/qwen2.5-0.5b-sft-full
overwrite_output_dir: true
logging_steps: 1
save_steps: 1000
save_total_limit: 5

# ------------------------------------------------------------------------------
# Training Hyperparameters (VALIDATED)
# ------------------------------------------------------------------------------
# Batch Size Configuration
# Effective batch size = 16 × 4 = 64 (optimal for 0.5B model)
per_device_train_batch_size: 16
gradient_accumulation_steps: 4

# Learning Rate Configuration
# 2e-5 is standard for full finetuning (range: 1e-5 to 5e-5)
learning_rate: 2.0e-5
lr_scheduler_type: cosine
warmup_steps: 469  # 5% of 9376 total steps

# Training Duration
# 2 epochs for 300k data prevents overfitting (range: 1-3 epochs)
num_train_epochs: 2.0
max_steps: -1  # Use num_train_epochs

# Optimization
# AdamW with standard parameters
optim: adamw_torch
weight_decay: 0.01
adam_beta1: 0.9
adam_beta2: 0.999
adam_epsilon: 1.0e-8
max_grad_norm: 1.0

# Precision Configuration
# FP16 for speed, A100 has good FP16 support
fp16: true
bf16: false
fp16_full_eval: false

# Performance Configuration
dataloader_num_workers: 8
dataloader_prefetch_factor: 2
gradient_checkpointing: false  # Disabled for speed (enough VRAM)

# ------------------------------------------------------------------------------
# Reproducibility
# ------------------------------------------------------------------------------
seed: 42
data_seed: 42

# ------------------------------------------------------------------------------
# Logging Configuration
# ------------------------------------------------------------------------------
report_to: tensorboard
logging_first_step: true
logging_nan_inf_filter: true